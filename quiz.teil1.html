<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:90%;
            max-width:400px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h1{
            margin-bottom:15px;
        }

        p{
            color:#555;
        }

        button{
            margin-top:20px;
            padding:15px 40px;
            font-size:20px;
            border:none;
            border-radius:10px;
            background:#007BFF;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="box">

<h1>Schlaumeier Quiz</h1>

<p>Teste dein Wissen und beantworte alle Fragen!</p>

<button onclick="window.location.href='quiz.übersicht.html'">
Start
</button>

<button onclick="window.location.href='übersicht.html'">
zurück
</button>

</div>

</body>
</html>
