<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaktionsspiel</title>

<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
}

#feld{
    width:250px;
    height:250px;
    background:red;
    margin:auto;
    display:none;
    cursor:pointer;
}
</style>
</head>
<body>
<h1>Reaktionsspiel</h1>
<p>Sobald dass feld die farbe ändert, klicke so schnell wie möglich darauf. Deine Reaktionszeit wird gemessen. Viel Erfolg!</p>
<div id="feld"></div>
<p id="zeit"></p>
<script>

let start;
function starten(){
let warten=Math.random()*3000+1000;
setTimeout(function(){

document.getElementById("feld").style.display="block";
document.getElementById("feld").style.background="green";
start=Date.now();
},warten);
}

document.getElementById("feld").onclick=function(){
let ende=Date.now();
let reaktion=(ende-start)/1000;
document.getElementById("zeit").innerHTML="Deine Zeit: "+reaktion+" Sekunden";
this.style.display="none";
starten();
}

starten();

</script>

<button onclick="window.location.href='übersicht.html'">
        zurück
</button>

</body>
</html>
